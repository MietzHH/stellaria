<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="70%">
      <stop offset="0%" stop-color="#2a2a5e"/>
      <stop offset="50%" stop-color="#0f0f2e"/>
      <stop offset="100%" stop-color="#050510"/>
    </radialGradient>
    <radialGradient id="nebula" cx="70%" cy="30%" r="50%">
      <stop offset="0%" stop-color="#8855cc" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#8855cc" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Hintergrund -->
  <rect width="512" height="512" fill="url(#bg)"/>
  <rect width="512" height="512" fill="url(#nebula)"/>

  <!-- Hintergrund-Sterne -->
  <g fill="white">
    <circle cx="80" cy="100" r="2" opacity="0.5"/>
    <circle cx="420" cy="80" r="1.5" opacity="0.4"/>
    <circle cx="60" cy="350" r="1.5" opacity="0.5"/>
    <circle cx="440" cy="380" r="2" opacity="0.5"/>
    <circle cx="180" cy="50" r="1" opacity="0.4"/>
    <circle cx="350" cy="450" r="1" opacity="0.4"/>
    <circle cx="100" cy="450" r="1.5" opacity="0.5"/>
    <circle cx="470" cy="200" r="1" opacity="0.4"/>
    <circle cx="40" cy="220" r="1" opacity="0.4"/>
    <circle cx="280" cy="40" r="1.5" opacity="0.5"/>
    <circle cx="120" cy="200" r="1" opacity="0.3"/>
    <circle cx="380" cy="280" r="1.2" opacity="0.4"/>
  </g>

  <!-- Sternbild "Großer Wagen" stilisiert -->
  <g filter="url(#glow)">
    <!-- Linien zwischen den Sternen (goldgelb, leuchtend) -->
    <g stroke="#ffe4a8" stroke-width="3" stroke-linecap="round" opacity="0.85">
      <line x1="140" y1="320" x2="200" y2="290"/>
      <line x1="200" y1="290" x2="265" y2="270"/>
      <line x1="265" y1="270" x2="320" y2="240"/>
      <line x1="320" y1="240" x2="370" y2="195"/>
      <line x1="370" y1="195" x2="395" y2="155"/>
      <line x1="395" y1="155" x2="370" y2="115"/>
      <line x1="320" y1="240" x2="370" y2="115"/>
    </g>
    <!-- Sterne als helle Punkte -->
    <g fill="#fff8dc">
      <circle cx="140" cy="320" r="9"/>
      <circle cx="200" cy="290" r="8"/>
      <circle cx="265" cy="270" r="9"/>
      <circle cx="320" cy="240" r="10"/>
      <circle cx="370" cy="195" r="9"/>
      <circle cx="395" cy="155" r="11"/>
      <circle cx="370" cy="115" r="8"/>
    </g>
  </g>

  <!-- Polarstern oben (heller, größer) -->
  <g filter="url(#glow)">
    <circle cx="256" cy="100" r="6" fill="#ffffff"/>
    <circle cx="256" cy="100" r="14" fill="#ffffff" opacity="0.2"/>
  </g>
</svg>
