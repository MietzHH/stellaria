<style>

  .nebula {

  @keyframes pulse {

    50% { opacity: 0.7; transform: scale(1.3); }
  }
  @keyframes drawLine {
    from { stroke-dasharray: 200; stroke-dashoffset: 200; }
    to { stroke-dasharray: 200; stroke-dashoffset: 0; }
  }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes shake {
    0%,100% { transform: translateX(0); }
    25% { transform: translateX(-6px); }
    75% { transform: translateX(6px); }
  }
  @keyframes shoot {
    0% { opacity: 0; transform: translateX(0); }
    15% { opacity: 1; }
    100% { opacity: 0; transform: translateX(250px); }
  }
  @keyframes hintPulse {
    0%,100% { opacity: 0.3; }
    50% { opacity: 0.9; }
  }
  .shake { animation: shake 0.4s ease-in-out; }
  .header {
    position: absolute; top: 0; left: 0; right: 0;
    padding: max(20px, env(safe-area-inset-top)) 16px 0;
    display: flex; justify-content: space-between; align-items: flex-start;
    z-index: 20; gap: 8px;
  }
  .brand-label {
    color: rgba(255, 248, 220, 0.6); font-size: 11px;
    letter-spacing: 0.3em; text-transform: uppercase;

  }
  .nav-btn:active, .nav-btn.active { background: rgba(255, 248, 220, 0.15); color: #fff8dc; }
  .stage {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
  }
  .constellation-svg {
    width: 90vmin; height: 90vmin;
    max-width: 100%; max-height: 100%;
    filter: drop-shadow(0 0 20px rgba(255, 220, 150, 0.1));
    overflow: visible;
  }
  .footer {
    position: absolute;
    bottom: max(20px, env(safe-area-inset-bottom));
    left: 0; right: 0; text-align: center;
    padding: 0 24px; z-index: 5;
  }
  .progress-label {
    color: rgba(255, 248, 220, 0.4); font-size: 10px;
    letter-spacing: 0.4em; text-transform: uppercase;
    margin-bottom: 6px; pointer-events: none;
  }
  .name { font-size: 26px; font-style: italic; letter-spacing: 0.02em; color: #fff8dc; pointer-events: none; }
  .latin { color: rgba(255, 248, 220, 0.4); font-size: 11px; letter-spacing: 0.2em; margin-top: 2px; pointer-events: none; }
  .help-bar {
    margin-top: 12px; display: flex; gap: 10px;
    justify-content: center; flex-wrap: wrap;
  }
  .help-btn {
    background: transparent; color: rgba(255, 248, 220, 0.65);
    font-family: inherit; font-size: 10px;
    letter-spacing: 0.25em; text-transform: uppercase;
    border: 1px solid rgba(255, 248, 220, 0.18);
    padding: 8px 16px; border-radius: 999px;
    backdrop-filter: blur(8px); cursor: pointer; transition: all 0.3s;
  }
  .help-btn:active { background: rgba(255, 248, 220, 0.1); }
  .help-btn:disabled { opacity: 0.3; cursor: default; }
  .overlay {
    position: absolute; inset: 0; z-index: 30;

    backdrop-filter: blur(8px);

  .complete-content > *:nth-child(4) { animation-delay: 0.7s; }
  .complete-content > *:nth-child(5) { animation-delay: 0.9s; }

    color: rgba(255, 248, 220, 0.5); font-size: 10px;
    letter-spacing: 0.4em; text-transform: uppercase; margin-bottom: 12px;

  .complete-name {
    font-size: 40px; font-style: italic; color: #fff8dc;

  .complete-latin {

  .continue-btn:active { background: rgba(255, 248, 220, 0.15); }

  .shooting-star {
    position: absolute;
    width: 120px; height: 1px;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.9), transparent);
    pointer-events: none;
    animation: shoot 1.5s ease-out forwards;
  }
  .hint-glow { animation: hintPulse 1s ease-in-out infinite; }
  .line-drawn { animation: drawLine 0.8s ease-out; }

  .sky-info {
    position: absolute;

    left: 0; right: 0;
    text-align: center;
    color: rgba(255, 248, 220, 0.5);
    font-size: 11px;
    letter-spacing: 0.2em;
    z-index: 9;
    pointer-events: none;
    font-style: italic;
  }
  .sky-label {
    position: absolute;
    color: rgba(255, 248, 220, 0.7);
    font-size: 13px;
    font-style: italic;
    letter-spacing: 0.05em;
    pointer-events: none;
    text-shadow: 0 0 8px rgba(0,0,0,0.8);
    z-index: 9;
    transform: translate(-50%, -50%);
    transition: opacity 0.4s;
  }
</style>
</head>

let currentIdx = 0;
let drawnLines = [];
let lastStarClicked = null;
let unlocked = new Set();
let view = "play";
let hintStarIdx = null;
let hintTimer = null;

try {
  const saved = localStorage.getItem("stellaria-unlocked");
  if (saved) unlocked = new Set(JSON.parse(saved));
} catch(e) {}

function saveProgress() {
  try { localStorage.setItem("stellaria-unlocked", JSON.stringify([...unlocked])); } catch(e) {}
}

function generateBgStars() {
  const svg = document.getElementById("bgStars");
  let html = "";
  for (let i = 0; i < 140; i++) {
    const x = Math.random() * 100;
    const y = Math.random() * 100;
    const size = Math.random() * 0.18 + 0.05;
    const dur = Math.random() * 4 + 2;
    const delay = Math.random() * 5;
    const op = Math.random() * 0.6 + 0.2;
    html += `<circle cx="${x}" cy="${y}" r="${size}" fill="white" opacity="${op}" style="animation: twinkle ${dur}s ease-in-out ${delay}s infinite"/>`;
  }
  svg.innerHTML = html;
}

function spawnShootingStar() {
  if (view !== "play" && view !== "gallery") return;
  const c = document.getElementById("shootingStars");
  const el = document.createElement("div");
  el.className = "shooting-star";
  el.style.left = (Math.random() * 60) + "%";
  el.style.top = (Math.random() * 40) + "%";
  el.style.transform = `rotate(${25 + Math.random() * 25}deg)`;
  c.appendChild(el);
  setTimeout(() => el.remove(), 1600);
}
setInterval(spawnShootingStar, 9000);
setTimeout(spawnShootingStar, 2000);

function showToast(msg) {
  document.querySelectorAll(".toast").forEach(t => t.remove());
  const t = document.createElement("div");
  t.className = "toast";
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2000);
}

function renderConstellation() {
  const c = CONSTELLATIONS[currentIdx];
  const svg = document.getElementById("constellationSvg");
  const connectedStars = new Set();
  drawnLines.forEach(li => {
    connectedStars.add(c.lines[li][0]);
    connectedStars.add(c.lines[li][1]);
  });
  if (lastStarClicked !== null) connectedStars.add(lastStarClicked);

  let html = "";
  drawnLines.forEach((li, idx) => {
    const line = c.lines[li];
    const a = c.stars[line[0]];
    const b = c.stars[line[1]];
    html += `<line x1="${a[0]}" y1="${a[1]}" x2="${b[0]}" y2="${b[1]}"
      stroke="rgba(255,220,150,0.7)" stroke-width="0.25" stroke-linecap="round"
      style="filter: drop-shadow(0 0 1px rgba(255,220,150,0.8))"
      class="${idx === drawnLines.length - 1 ? 'line-drawn' : ''}"/>`;
  });

  c.stars.forEach((s, i) => {
    const isUsed = connectedStars.has(i);
    const isLast = i === lastStarClicked;
    const isHint = i === hintStarIdx;
    const fill = isLast ? "#fff8dc" : isUsed ? "#ffd97a" : "rgba(255,255,255,0.85)";
    const r = isLast ? 1.3 : isUsed ? 1.0 : 0.75;
    const glow = isLast ? "drop-shadow(0 0 3px rgba(255,220,150,1))"
      : isUsed ? "drop-shadow(0 0 2px rgba(255,200,100,0.8))"
      : "drop-shadow(0 0 1.5px rgba(255,255,255,0.7))";

    if (isHint) {
      html += `<circle cx="${s[0]}" cy="${s[1]}" r="3" fill="rgba(150,200,255,0.4)" class="hint-glow"/>`;
    }
    html += `<circle cx="${s[0]}" cy="${s[1]}" r="${r}" fill="${fill}"
      style="filter: ${glow}; transition: all 0.3s ease; cursor: pointer;"
      data-star="${i}"/>`;
    html += `<circle cx="${s[0]}" cy="${s[1]}" r="5" fill="transparent"
      style="cursor: pointer;" data-star="${i}"/>`;
  });

  svg.innerHTML = html;
  svg.querySelectorAll("[data-star]").forEach(el => {
    el.addEventListener("click", (e) => {
      handleStarClick(parseInt(e.target.getAttribute("data-star")));
    });
  });

  document.getElementById("progressLabel").textContent =
    isComplete() ? "Vollendet" : `${drawnLines.length} / ${c.lines.length} Linien`;
  document.getElementById("constellationName").textContent = c.name;
  document.getElementById("constellationLatin").textContent = c.latin;
  document.getElementById("progressCount").textContent =
    `${unlocked.size} / ${CONSTELLATIONS.length} entdeckt`;
  document.getElementById("hintBtn").disabled = isComplete();
  document.getElementById("revealBtn").disabled = isComplete();
}

function getValidNextStars() {
  const c = CONSTELLATIONS[currentIdx];
  if (isComplete()) return [];
  const remaining = c.lines.map((l, i) => ({l, i})).filter(x => !drawnLines.includes(x.i));
  if (lastStarClicked === null) {
    const stars = new Set();
    remaining.forEach(({l}) => { stars.add(l[0]); stars.add(l[1]); });
    return [...stars];
  }
  const stars = new Set();
  remaining.forEach(({l}) => {
    if (l[0] === lastStarClicked) stars.add(l[1]);
    if (l[1] === lastStarClicked) stars.add(l[0]);
  });
  if (stars.size === 0) {
    remaining.forEach(({l}) => { stars.add(l[0]); stars.add(l[1]); });
  }
  return [...stars];
}

function handleStarClick(idx) {
  if (isComplete()) return;
  if (hintStarIdx !== null) {
    hintStarIdx = null;
    if (hintTimer) clearTimeout(hintTimer);
  }
  const c = CONSTELLATIONS[currentIdx];
  const valid = getValidNextStars();
  if (!valid.includes(idx)) {
    triggerShake();
    return;
  }
  if (lastStarClicked === null) {
    lastStarClicked = idx;
    renderConstellation();
    return;
  }
  const lineIdx = c.lines.findIndex((line, li) =>
    !drawnLines.includes(li) &&
    ((line[0] === lastStarClicked && line[1] === idx) ||
     (line[1] === lastStarClicked && line[0] === idx))
  );
  if (lineIdx === -1) {
    lastStarClicked = idx;
    renderConstellation();
    return;
  }
  drawnLines.push(lineIdx);
  lastStarClicked = idx;
  renderConstellation();
  if (isComplete()) {
    setTimeout(() => {
      const wasNew = !unlocked.has(c.id);
      unlocked.add(c.id);
      saveProgress();
      showComplete(wasNew, false);
    }, 700);
  }
}

function showHint() {
  if (isComplete()) return;
  const valid = getValidNextStars();
  if (valid.length === 0) return;
  let candidates = valid.filter(v => v !== hintStarIdx);
  if (candidates.length === 0) candidates = valid;
  hintStarIdx = candidates[Math.floor(Math.random() * candidates.length)];
  renderConstellation();
  showToast("Versuch diesen Stern");
  if (hintTimer) clearTimeout(hintTimer);
  hintTimer = setTimeout(() => {
    hintStarIdx = null;
    renderConstellation();
  }, 4000);
}

function revealConstellation() {
  if (isComplete()) return;
  lastStarClicked = null;
  hintStarIdx = null;
  if (hintTimer) clearTimeout(hintTimer);

  const c = CONSTELLATIONS[currentIdx];
  const remaining = c.lines.map((_, i) => i).filter(i => !drawnLines.includes(i));
  let i = 0;
  const drawNext = () => {
    if (i >= remaining.length) {
      setTimeout(() => showComplete(false, true), 600);
      return;
    }
    drawnLines.push(remaining[i]);
    renderConstellation();
    i++;
    setTimeout(drawNext, 280);
  };
  drawNext();
}

function isComplete() {
  return drawnLines.length === CONSTELLATIONS[currentIdx].lines.length;
}

function triggerShake() {
  const stage = document.getElementById("stage");
  stage.classList.add("shake");
  setTimeout(() => stage.classList.remove("shake"), 400);
}

function showComplete(wasNew, wasRevealed) {
  const c = CONSTELLATIONS[currentIdx];
  document.getElementById("completeLabel").textContent =
    wasRevealed ? "Aufgelöst" : "Sternbild vollendet";
  document.getElementById("completeName").textContent = c.name;
  document.getElementById("completeLatin").textContent = c.latin;
  document.getElementById("completeDesc").textContent = c.desc;
  document.getElementById("completeOverlay").style.display = "flex";
}

function nextConstellation() {
  currentIdx = (currentIdx + 1) % CONSTELLATIONS.length;
  drawnLines = [];
  lastStarClicked = null;
  hintStarIdx = null;
  document.getElementById("completeOverlay").style.display = "none";
  renderConstellation();
}

function renderGallery() {
  const grid = document.getElementById("galleryGrid");
  let html = "";
  CONSTELLATIONS.forEach((c, i) => {
    const isUnlocked = unlocked.has(c.id);
    let inner = "";
    if (isUnlocked) {
      c.lines.forEach(line => {
        const a = c.stars[line[0]];
        const b = c.stars[line[1]];
        inner += `<line x1="${a[0]}" y1="${a[1]}" x2="${b[0]}" y2="${b[1]}" stroke="rgba(255,220,150,0.5)" stroke-width="0.2"/>`;
      });
    }
    c.stars.forEach(s => {
      inner += `<circle cx="${s[0]}" cy="${s[1]}" r="${isUnlocked ? 0.8 : 0.5}" fill="${isUnlocked ? '#ffd97a' : 'rgba(255,255,255,0.3)'}"/>`;
    });
    html += `
      <div class="gallery-card ${isUnlocked ? '' : 'locked'}" data-idx="${i}" style="animation-delay: ${Math.min(i * 0.015, 0.5)}s">
        <svg viewBox="0 0 100 100">${inner}</svg>
        <div class="gallery-card-label">${isUnlocked ? c.name : "???"}</div>
      </div>`;
  });
  grid.innerHTML = html;
  document.getElementById("gallerySubtitle").textContent =
    `${unlocked.size} von ${CONSTELLATIONS.length} entdeckt`;
  grid.querySelectorAll(".gallery-card").forEach(el => {
    el.addEventListener("click", () => {
      currentIdx = parseInt(el.getAttribute("data-idx"));
      drawnLines = [];
      lastStarClicked = null;
      hintStarIdx = null;
      switchView("play");
    });
  });
}

// === 3D Himmelsansicht ===
let skyState = {
  rotY: 0,
  rotX: -0.2,
  velY: 0.003, // sanfte Auto-Rotation
  isDragging: false,
  lastX: 0,
  lastY: 0,
  raf: null
};

function project3D(ra, dec, radius = 1) {
  // ra (0-24h) → Längengrad
  // dec (-90 bis 90) → Breitengrad
  const lon = (ra / 24) * Math.PI * 2;
  const lat = (dec / 90) * (Math.PI / 2);
  const x = radius * Math.cos(lat) * Math.cos(lon);
  const y = radius * Math.sin(lat);
  const z = radius * Math.cos(lat) * Math.sin(lon);
  return { x, y, z };
}

function rotatePoint(p, rotX, rotY) {
  // Rotation um Y-Achse (horizontal)
  let x = p.x * Math.cos(rotY) - p.z * Math.sin(rotY);
  let z = p.x * Math.sin(rotY) + p.z * Math.cos(rotY);
  let y = p.y;
  // Rotation um X-Achse (vertikal kippen)
  const y2 = y * Math.cos(rotX) - z * Math.sin(rotX);
  const z2 = y * Math.sin(rotX) + z * Math.cos(rotX);
  return { x, y: y2, z: z2 };
}

function renderSky() {
  const canvas = document.getElementById("skyCanvas");
  if (!canvas || canvas.style.display === "none") return;
  if (canvas.clientWidth === 0 || canvas.clientHeight === 0) return;

  const dpr = window.devicePixelRatio || 1;
  const targetW = canvas.clientWidth * dpr;
  const targetH = canvas.clientHeight * dpr;
  if (canvas.width !== targetW) canvas.width = targetW;
  if (canvas.height !== targetH) canvas.height = targetH;

  const W = canvas.width;
  const H = canvas.height;
  const ctx = canvas.getContext("2d");
  if (!ctx) return;

  // Hintergrund komplett füllen damit der Himmel "echt" aussieht
  const bgGrad = ctx.createRadialGradient(W/2, H/2, 0, W/2, H/2, Math.max(W,H)*0.7);
  bgGrad.addColorStop(0, "#1a1a3e");
  bgGrad.addColorStop(0.5, "#0a0a1f");
  bgGrad.addColorStop(1, "#050510");
  ctx.fillStyle = bgGrad;
  ctx.fillRect(0, 0, W, H);

  const cx = W / 2;
  const cy = H / 2;
  const radius = Math.min(W, H) * 0.42;

  // Hintergrund-Kugel-Sterne (zufällig, zur Welt gehörend)
  if (!window._skyBgStars) {
    window._skyBgStars = [];
    for (let i = 0; i < 600; i++) {
      const ra = Math.random() * 24;
      const dec = (Math.random() * 180) - 90;
      const brightness = Math.random() * 0.7 + 0.3;
      const size = Math.random() * 1.5 + 0.3;
      window._skyBgStars.push({ ra, dec, brightness, size });
    }
  }

  // Hintergrund-Sterne zeichnen
  window._skyBgStars.forEach(s => {
    const p = project3D(s.ra, s.dec);
    const r = rotatePoint(p, skyState.rotX, skyState.rotY);
    if (r.z > 0) {
      const px = cx + r.x * radius;
      const py = cy - r.y * radius;
      const depth = (r.z + 1) / 2;
      ctx.fillStyle = `rgba(255, 255, 255, ${s.brightness * depth * 0.7})`;
      ctx.beginPath();
      ctx.arc(px, py, s.size * window.devicePixelRatio, 0, Math.PI * 2);
      ctx.fill();
    }
  });

  // Horizont-Linie / Äquator
  ctx.strokeStyle = "rgba(150, 180, 220, 0.15)";
  ctx.lineWidth = 1 * window.devicePixelRatio;
  ctx.beginPath();
  for (let i = 0; i <= 360; i += 4) {
    const ra = (i / 360) * 24;
    const p = project3D(ra, 0);
    const r = rotatePoint(p, skyState.rotX, skyState.rotY);
    if (r.z > -0.05) {
      const px = cx + r.x * radius;
      const py = cy - r.y * radius;
      if (i === 0) ctx.moveTo(px, py);
      else ctx.lineTo(px, py);
    } else {
      ctx.moveTo(cx, cy);
    }
  }
  ctx.stroke();

  // Labels-Container leeren
  const labelsContainer = document.getElementById("skyLabels");
  labelsContainer.innerHTML = "";

  // Sternbilder zeichnen
  CONSTELLATIONS.forEach(c => {
    const isUnlocked = unlocked.has(c.id);
    if (!c.sky) return;

    // Zentrum des Sternbilds am Himmel berechnen
    const centerP = project3D(c.sky[0], c.sky[1]);
    const centerR = rotatePoint(centerP, skyState.rotX, skyState.rotY);

    if (centerR.z < 0) return; // hinter der Kugel

    // Sterne des Sternbilds: aus 100x100 normalisierten Koordinaten in lokale Position
    // Wir verteilen die Sterne in einem kleinen Bereich um centerR
    const localScale = 0.06; // Größe des Sternbilds am Himmel
    const localStars = c.stars.map(s => {
      // s ist [0..100, 0..100] — wir zentrieren um (50,50)
      const lx = (s[0] - 50) / 100 * localScale;
      const ly = (s[1] - 50) / 100 * localScale;
      // Tangentiale Verschiebung um centerR
      // Vereinfacht: nutze den lokalen Tangentenraum
      // Tangent X: senkrecht zu (centerP) und Y-Achse
      const tx = { x: -Math.sin(c.sky[0]/24 * Math.PI*2), y: 0, z: Math.cos(c.sky[0]/24 * Math.PI*2) };
      const ty = { x: -Math.sin(c.sky[1]/90 * Math.PI/2) * Math.cos(c.sky[0]/24 * Math.PI*2),
                   y:  Math.cos(c.sky[1]/90 * Math.PI/2),
                   z: -Math.sin(c.sky[1]/90 * Math.PI/2) * Math.sin(c.sky[0]/24 * Math.PI*2) };
      const wx = centerP.x + tx.x * lx + ty.x * (-ly);
      const wy = centerP.y + tx.y * lx + ty.y * (-ly);
      const wz = centerP.z + tx.z * lx + ty.z * (-ly);
      const r = rotatePoint({x:wx,y:wy,z:wz}, skyState.rotX, skyState.rotY);
      return r;
    });

    // Linien
    if (isUnlocked) {
      ctx.strokeStyle = `rgba(255, 220, 150, ${0.4 + centerR.z * 0.3})`;
      ctx.lineWidth = 1 * window.devicePixelRatio;
      c.lines.forEach(line => {
        const a = localStars[line[0]];
        const b = localStars[line[1]];
        if (a.z > 0 && b.z > 0) {
          ctx.beginPath();
          ctx.moveTo(cx + a.x * radius, cy - a.y * radius);
          ctx.lineTo(cx + b.x * radius, cy - b.y * radius);
          ctx.stroke();
        }
      });
    }

    // Sterne
    localStars.forEach((s, i) => {
      if (s.z < 0) return;
      const px = cx + s.x * radius;
      const py = cy - s.y * radius;
      const depth = (s.z + 1) / 2;
      const isUsed = isUnlocked;
      const color = isUsed ? `rgba(255, 217, 122, ${0.7 + depth * 0.3})`
                           : `rgba(255, 255, 255, ${0.4 + depth * 0.4})`;
      const size = (isUsed ? 1.8 : 1.2) * window.devicePixelRatio * (0.7 + depth * 0.3);
      ctx.fillStyle = color;
      ctx.shadowBlur = isUsed ? 6 : 3;
      ctx.shadowColor = isUsed ? "rgba(255,200,100,0.6)" : "rgba(255,255,255,0.4)";
      ctx.beginPath();
      ctx.arc(px, py, size, 0, Math.PI * 2);
      ctx.fill();
      ctx.shadowBlur = 0;
    });

    // Label für entdecktes Sternbild
    if (isUnlocked && centerR.z > 0.3) {
      const px = cx + centerR.x * radius;
      const py = cy - centerR.y * radius;
      const lab = document.createElement("div");
      lab.className = "sky-label";
      lab.textContent = c.name;
      lab.style.left = (px / window.devicePixelRatio) + "px";
      lab.style.top = (py / window.devicePixelRatio + 30) + "px";
      lab.style.opacity = Math.min(1, (centerR.z - 0.3) * 2);
      labelsContainer.appendChild(lab);
    }
  });
}

function animateSky() {
  if (view !== "sky") {
    if (skyState.raf) cancelAnimationFrame(skyState.raf);
    return;
  }
  if (!skyState.isDragging) {
    skyState.rotY += skyState.velY;
  }
  renderSky();
  skyState.raf = requestAnimationFrame(animateSky);
}

function setupSkyInteraction() {
  const canvas = document.getElementById("skyCanvas");

  const onStart = (x, y) => {
    skyState.isDragging = true;
    skyState.lastX = x;
    skyState.lastY = y;
  };
  const onMove = (x, y) => {
    if (!skyState.isDragging) return;
    const dx = x - skyState.lastX;
    const dy = y - skyState.lastY;
    skyState.rotY += dx * 0.005;
    skyState.rotX = Math.max(-Math.PI/2, Math.min(Math.PI/2, skyState.rotX + dy * 0.005));
    skyState.lastX = x;
    skyState.lastY = y;
  };
  const onEnd = () => { skyState.isDragging = false; };

  canvas.addEventListener("mousedown", e => onStart(e.clientX, e.clientY));
  canvas.addEventListener("mousemove", e => onMove(e.clientX, e.clientY));
  canvas.addEventListener("mouseup", onEnd);
  canvas.addEventListener("mouseleave", onEnd);

  canvas.addEventListener("touchstart", e => {
    if (e.touches.length === 1) onStart(e.touches[0].clientX, e.touches[0].clientY);
  }, { passive: true });
  canvas.addEventListener("touchmove", e => {
    if (e.touches.length === 1) {
      onMove(e.touches[0].clientX, e.touches[0].clientY);
      e.preventDefault();
    }
  }, { passive: false });
  canvas.addEventListener("touchend", onEnd);
}

function switchView(target) {
  view = target;
  document.getElementById("gallery").style.display = "none";
  document.getElementById("stage").style.display = "none";
  document.getElementById("footer").style.display = "none";
  document.getElementById("skyCanvas").style.display = "none";
  document.getElementById("skyLabels").style.display = "none";
  document.getElementById("skyInfo").style.display = "none";

  document.getElementById("galleryBtn").classList.remove("active");
  document.getElementById("skyBtn").classList.remove("active");

  if (target === "gallery") {
    document.getElementById("gallery").style.display = "block";
    document.getElementById("galleryBtn").textContent = "Zurück";
    document.getElementById("galleryBtn").classList.add("active");
    renderGallery();
  } else if (target === "sky") {
    const canvas = document.getElementById("skyCanvas");
    canvas.style.display = "block";
    document.getElementById("skyLabels").style.display = "block";
    document.getElementById("skyInfo").style.display = "block";
    document.getElementById("skyBtn").textContent = "Zurück";
    document.getElementById("skyBtn").classList.add("active");
    // Canvas-Größe explizit setzen
    setTimeout(() => {
      canvas.width = canvas.clientWidth * window.devicePixelRatio;
      canvas.height = canvas.clientHeight * window.devicePixelRatio;
      animateSky();
    }, 50);
  } else {
    document.getElementById("stage").style.display = "flex";
    document.getElementById("footer").style.display = "block";
    document.getElementById("galleryBtn").textContent = "Sammlung";
    document.getElementById("skyBtn").textContent = "Himmel";
    renderConstellation();
  }
}

document.getElementById("galleryBtn").addEventListener("click", () => {
  switchView(view === "gallery" ? "play" : "gallery");
});
document.getElementById("skyBtn").addEventListener("click", () => {
  switchView(view === "sky" ? "play" : "sky");
});
document.getElementById("continueBtn").addEventListener("click", nextConstellation);
document.getElementById("hintBtn").addEventListener("click", showHint);
document.getElementById("revealBtn").addEventListener("click", () => {
  if (confirm("Das Sternbild komplett auflösen?")) revealConstellation();
});
document.getElementById("resetBtn").addEventListener("click", () => {
  if (confirm("Allen Fortschritt wirklich zurücksetzen?")) {
    unlocked = new Set();
    saveProgress();
    renderGallery();
    document.getElementById("progressCount").textContent =
      `0 / ${CONSTELLATIONS.length} entdeckt`;
  }
});

window.addEventListener("resize", () => {
  if (view === "sky") renderSky();
});

generateBgStars();
setupSkyInteraction();
renderConstellation();
</script>
