<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0a1f">
<title>Stellaria</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ccircle cx='50' cy='50' r='3' fill='%23ffd97a'/%3E%3Ccircle cx='25' cy='30' r='1.5' fill='white'/%3E%3Ccircle cx='75' cy='35' r='1.5' fill='white'/%3E%3Ccircle cx='30' cy='75' r='1.5' fill='white'/%3E%3Ccircle cx='70' cy='70' r='1.5' fill='white'/%3E%3C/svg%3E">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body {
    height: 100%; overflow: hidden;
    font-family: 'Iowan Old Style', 'Apple Garamond', 'Baskerville', 'Georgia', 'Times New Roman', serif;
    font-weight: 300; background: #050510; color: #fff8dc;
    overscroll-behavior: none; -webkit-user-select: none; user-select: none;
    touch-action: none;
  }
  body {
    background: radial-gradient(ellipse at top, #1a1a3e 0%, #0a0a1f 50%, #050510 100%);
    position: relative; width: 100vw; height: 100vh; height: 100dvh;
  }
  .nebula {
    position: absolute; inset: 0; pointer-events: none;
    background:
      radial-gradient(ellipse at 70% 20%, rgba(140,90,220,0.25) 0%, transparent 45%),
      radial-gradient(ellipse at 20% 70%, rgba(80,140,220,0.18) 0%, transparent 45%),
      radial-gradient(ellipse at 85% 85%, rgba(200,140,180,0.12) 0%, transparent 40%);
    opacity: 0.8;
  }
  .bg-stars { position: absolute; inset: 0; width: 100%; height: 100%; }
  @keyframes twinkle { 0%,100% { opacity: 0.2; } 50% { opacity: 1; } }
  @keyframes pulse {
    0%,100% { opacity: 0.25; transform: scale(1); }
    50% { opacity: 0.7; transform: scale(1.3); }
  }
  @keyframes drawLine {
    from { stroke-dasharray: 200; stroke-dashoffset: 200; }
    to { stroke-dasharray: 200; stroke-dashoffset: 0; }
  }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(10px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes shake {
    0%,100% { transform: translateX(0); }
    25% { transform: translateX(-6px); }
    75% { transform: translateX(6px); }
  }
  @keyframes shoot {
    0% { opacity: 0; transform: translateX(0); }
    15% { opacity: 1; }
    100% { opacity: 0; transform: translateX(250px); }
  }
  @keyframes hintPulse {
    0%,100% { opacity: 0.3; }
    50% { opacity: 0.9; }
  }
  @keyframes starPulse {
    0%,100% { opacity: 0.85; }
    50% { opacity: 1; }
  }
  .shake { animation: shake 0.4s ease-in-out; }
  .header {
    position: absolute; top: 0; left: 0; right: 0;
    padding: max(20px, env(safe-area-inset-top)) 16px 0;
    display: flex; justify-content: space-between; align-items: flex-start;
    z-index: 20; gap: 8px;
  }
  .brand-label {
    color: rgba(255, 248, 220, 0.7); font-size: 12px;
    letter-spacing: 0.35em; text-transform: uppercase;
    font-weight: 400;
  }
  .brand-sub {
    color: rgba(255, 248, 220, 0.4); font-size: 10px;
    letter-spacing: 0.2em; margin-top: 4px;
  }
  .nav-buttons { display: flex; gap: 8px; }
  .nav-btn {
    background: rgba(20, 20, 50, 0.4); color: rgba(255, 248, 220, 0.75);
    font-family: inherit; font-size: 10px;
    letter-spacing: 0.2em; text-transform: uppercase;
    border: 1px solid rgba(255, 248, 220, 0.25);
    padding: 8px 14px; border-radius: 999px;
    backdrop-filter: blur(10px); cursor: pointer; transition: all 0.3s;
    white-space: nowrap;
  }
  .nav-btn:active, .nav-btn.active { background: rgba(255, 248, 220, 0.15); color: #fff8dc; border-color: rgba(255, 248, 220, 0.5); }
  .stage {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
  }
  .constellation-svg {
    width: 88vmin; height: 88vmin;
    max-width: 100%; max-height: 100%;
    filter: drop-shadow(0 0 30px rgba(255, 220, 150, 0.15));
    overflow: visible;
  }
  .footer {
    position: absolute;
    bottom: max(20px, env(safe-area-inset-bottom));
    left: 0; right: 0; text-align: center;
    padding: 0 24px; z-index: 5;
  }
  .progress-label {
    color: rgba(255, 248, 220, 0.45); font-size: 10px;
    letter-spacing: 0.4em; text-transform: uppercase;
    margin-bottom: 6px; pointer-events: none;
  }
  .name { font-size: 28px; font-style: italic; letter-spacing: 0.02em; color: #fff8dc; pointer-events: none; }
  .latin { color: rgba(255, 248, 220, 0.45); font-size: 11px; letter-spacing: 0.2em; margin-top: 2px; pointer-events: none; }
  .visibility-badge {
    display: inline-block;
    margin-top: 8px;
    color: rgba(180, 200, 255, 0.7);
    font-size: 10px;
    letter-spacing: 0.15em;
    font-style: italic;
    pointer-events: none;
  }
  .help-bar {
    margin-top: 14px; display: flex; gap: 10px;
    justify-content: center; flex-wrap: wrap;
  }
  .help-btn {
    background: rgba(20, 20, 50, 0.4); color: rgba(255, 248, 220, 0.7);
    font-family: inherit; font-size: 10px;
    letter-spacing: 0.25em; text-transform: uppercase;
    border: 1px solid rgba(255, 248, 220, 0.2);
    padding: 8px 16px; border-radius: 999px;
    backdrop-filter: blur(10px); cursor: pointer; transition: all 0.3s;
  }
  .help-btn:active { background: rgba(255, 248, 220, 0.1); }
  .help-btn:disabled { opacity: 0.3; cursor: default; }
  .info-btn {
    position: absolute;
    top: max(70px, calc(env(safe-area-inset-top) + 60px));
    right: 16px;
    background: rgba(20, 20, 50, 0.4);
    color: rgba(255, 248, 220, 0.7);
    border: 1px solid rgba(255, 248, 220, 0.2);
    width: 32px; height: 32px;
    border-radius: 50%;
    font-family: inherit; font-style: italic;
    font-size: 16px;
    cursor: pointer;
    backdrop-filter: blur(10px);
    z-index: 18;
    transition: all 0.3s;
  }
  .info-btn:active { background: rgba(255, 248, 220, 0.15); }
  .overlay {
    position: absolute; inset: 0; z-index: 30;
    background: rgba(5, 5, 20, 0.85);
    backdrop-filter: blur(10px);
    display: flex; align-items: center; justify-content: center;
    padding: 24px; animation: fadeIn 0.6s ease-out;
    overflow-y: auto;
  }
  .complete-content { text-align: center; max-width: 460px; padding: 40px 0; }
  .complete-content > * { animation: fadeUp 0.8s ease-out backwards; }
  .complete-content > *:nth-child(1) { animation-delay: 0.1s; }
  .complete-content > *:nth-child(2) { animation-delay: 0.3s; }
  .complete-content > *:nth-child(3) { animation-delay: 0.5s; }
  .complete-content > *:nth-child(4) { animation-delay: 0.7s; }
  .complete-content > *:nth-child(5) { animation-delay: 0.85s; }
  .complete-content > *:nth-child(6) { animation-delay: 1s; }
  .complete-content > *:nth-child(7) { animation-delay: 1.15s; }
  .complete-label {
    color: rgba(255, 248, 220, 0.5); font-size: 10px;
    letter-spacing: 0.4em; text-transform: uppercase; margin-bottom: 12px;
  }
  .complete-name {
    font-size: 40px; font-style: italic; color: #fff8dc;
    margin-bottom: 6px; letter-spacing: 0.02em;
  }
  .complete-latin {
    color: rgba(255, 248, 220, 0.5); font-size: 13px;
    letter-spacing: 0.2em; margin-bottom: 24px;
  }
  .complete-desc {
    color: rgba(255, 248, 220, 0.78); font-size: 16px;
    line-height: 1.7; font-style: italic; margin-bottom: 24px;
    text-align: left;
  }
  .complete-meta {
    display: flex; flex-direction: column; gap: 10px;
    margin-bottom: 32px;
    text-align: left;
    background: rgba(20, 20, 50, 0.3);
    border: 1px solid rgba(255, 248, 220, 0.1);
    border-radius: 12px;
    padding: 16px 20px;
  }
  .meta-row {
    display: flex;
    gap: 12px;
    align-items: flex-start;
    font-size: 13px;
    line-height: 1.5;
  }
  .meta-label {
    color: rgba(180, 200, 255, 0.7);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    font-size: 10px;
    min-width: 90px;
    padding-top: 2px;
  }
  .meta-value {
    color: rgba(255, 248, 220, 0.85);
    flex: 1;
  }
  .continue-btn {
    background: transparent; color: rgba(255, 248, 220, 0.9);
    font-family: inherit; font-size: 11px;
    letter-spacing: 0.3em; text-transform: uppercase;
    border: 1px solid rgba(255, 248, 220, 0.3);
    padding: 14px 32px; border-radius: 999px;
    cursor: pointer; transition: all 0.3s;
  }
  .continue-btn:active { background: rgba(255, 248, 220, 0.15); }
  .gallery {
    position: absolute; inset: 0; z-index: 10;
    overflow-y: auto;
    padding: max(80px, calc(env(safe-area-inset-top) + 70px)) 16px max(40px, env(safe-area-inset-bottom));
    -webkit-overflow-scrolling: touch;
    touch-action: pan-y;
  }
  .gallery-inner { max-width: 800px; margin: 0 auto; }
  .gallery-title {
    text-align: center; margin-bottom: 24px;
    animation: fadeUp 0.6s ease-out;
  }
  .gallery-title h2 {
    font-size: 36px; font-style: italic; color: #fff8dc;
    margin-bottom: 6px; font-weight: 400;
  }
  .gallery-title p {
    color: rgba(255, 248, 220, 0.4); font-size: 11px;
    letter-spacing: 0.3em; text-transform: uppercase;
  }
  .gallery-grid {
    display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 8px;
  }
  @media (min-width: 480px) {
    .gallery-grid { grid-template-columns: repeat(4, 1fr); }
  }
  @media (min-width: 700px) {
    .gallery-grid { grid-template-columns: repeat(5, 1fr); }
  }
  .gallery-card {
    position: relative; aspect-ratio: 1;
    background: rgba(15, 15, 35, 0.7);
    border: 1px solid rgba(255, 248, 220, 0.1);
    border-radius: 10px; overflow: hidden;
    cursor: pointer; transition: all 0.3s;
    animation: fadeUp 0.4s ease-out backwards;
  }
  .gallery-card:active { transform: scale(0.95); border-color: rgba(255, 248, 220, 0.4); }
  .gallery-card svg { width: 100%; height: 100%; }
  .gallery-card-label {
    position: absolute; bottom: 0; left: 0; right: 0;
    padding: 6px 8px;
    background: linear-gradient(to top, rgba(0,0,0,0.85), transparent);
    color: #fff8dc; font-size: 11px; font-style: italic;
    line-height: 1.2; min-height: 28px;
  }
  .locked .gallery-card-label { opacity: 0.4; }
  .shooting-star {
    position: absolute;
    width: 120px; height: 1px;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,0.9), transparent);
    pointer-events: none;
    animation: shoot 1.5s ease-out forwards;
  }
  .hint-glow { animation: hintPulse 1s ease-in-out infinite; }
  .line-drawn { animation: drawLine 0.8s ease-out; }
  .star-twinkle { animation: starPulse 3s ease-in-out infinite; }
  .reset-link {
    color: rgba(255, 248, 220, 0.3); font-size: 10px;
    letter-spacing: 0.2em; text-transform: uppercase;
    text-decoration: underline; text-decoration-color: rgba(255,248,220,0.15);
    margin-top: 24px; display: inline-block; cursor: pointer;
  }
  .toast {
    position: absolute; top: 22%; left: 50%;
    transform: translateX(-50%);
    background: rgba(5, 5, 20, 0.9); backdrop-filter: blur(10px);
    border: 1px solid rgba(255, 248, 220, 0.2);
    color: rgba(255, 248, 220, 0.9);
    font-size: 14px; font-style: italic;
    padding: 12px 22px; border-radius: 999px;
    z-index: 25; pointer-events: none;
    animation: fadeIn 0.3s ease-out; white-space: nowrap;
  }
  .sky-canvas {
    position: absolute; inset: 0;
    z-index: 8;
    cursor: grab;
    touch-action: none;
  }
  .sky-canvas:active { cursor: grabbing; }
  .sky-info {
    position: absolute;
    bottom: max(20px, env(safe-area-inset-bottom));
    left: 0; right: 0;
    text-align: center;
    color: rgba(255, 248, 220, 0.5);
    font-size: 11px;
    letter-spacing: 0.2em;
    z-index: 9;
    pointer-events: none;
    font-style: italic;
  }
  .sky-label {
    position: absolute;
    color: rgba(255, 248, 220, 0.75);
    font-size: 12px;
    font-style: italic;
    letter-spacing: 0.05em;
    pointer-events: none;
    text-shadow: 0 0 10px rgba(0,0,0,0.9), 0 0 4px rgba(0,0,0,1);
    z-index: 9;
    transform: translate(-50%, -50%);
    transition: opacity 0.4s;
    white-space: nowrap;
  }
  .close-overlay {
    position: absolute;
    top: 16px; right: 16px;
    background: rgba(20,20,50,0.5);
    border: 1px solid rgba(255,248,220,0.2);
    color: rgba(255,248,220,0.7);
    width: 36px; height: 36px;
    border-radius: 50%;
    font-size: 18px;
    cursor: pointer;
    backdrop-filter: blur(10px);
    z-index: 32;
  }
</style>
</head>
<body>
  <div class="nebula" id="nebula"></div>
  <svg class="bg-stars" viewBox="0 0 100 100" preserveAspectRatio="none" id="bgStars"></svg>
  <div id="shootingStars"></div>

  <div class="header">
    <div>
      <div class="brand-label">Stellaria</div>
      <div class="brand-sub" id="progressCount">0 / 88 entdeckt</div>
    </div>
    <div class="nav-buttons">
      <button class="nav-btn" id="skyBtn">Himmel</button>
      <button class="nav-btn" id="galleryBtn">Sammlung</button>
    </div>
  </div>

  <button class="info-btn" id="infoBtn" title="Info zum Sternbild">i</button>

  <div class="stage" id="stage">
    <svg class="constellation-svg" viewBox="0 0 100 100" id="constellationSvg"></svg>
  </div>

  <div class="footer" id="footer">
    <div class="progress-label" id="progressLabel">0 / 0 Linien</div>
    <div class="name" id="constellationName">—</div>
    <div class="latin" id="constellationLatin">—</div>
    <div class="visibility-badge" id="visibilityBadge">—</div>
    <div class="help-bar">
      <button class="help-btn" id="hintBtn">Hinweis</button>
      <button class="help-btn" id="revealBtn">Auflösen</button>
    </div>
  </div>

  <div class="gallery" id="gallery" style="display:none;">
    <div class="gallery-inner">
      <div class="gallery-title">
        <h2>Sammlung</h2>
        <p id="gallerySubtitle">Alle 88 Sternbilder</p>
      </div>
      <div class="gallery-grid" id="galleryGrid"></div>
      <div style="text-align:center;">
        <span class="reset-link" id="resetBtn">Fortschritt zurücksetzen</span>
      </div>
    </div>
  </div>

  <canvas class="sky-canvas" id="skyCanvas" style="display:none;"></canvas>
  <div id="skyLabels" style="display:none; position:absolute; inset:0; z-index:9; pointer-events:none;"></div>
  <div class="sky-info" id="skyInfo" style="display:none;">Wischen zum Drehen</div>

  <div class="overlay" id="completeOverlay" style="display:none;">
    <button class="close-overlay" id="closeCompleteBtn">×</button>
    <div class="complete-content">
      <div class="complete-label" id="completeLabel">Sternbild vollendet</div>
      <div class="complete-name" id="completeName">—</div>
      <div class="complete-latin" id="completeLatin">—</div>
      <p class="complete-desc" id="completeDesc">—</p>
      <div class="complete-meta">
        <div class="meta-row">
          <div class="meta-label">Hellster Stern</div>
          <div class="meta-value" id="metaStar">—</div>
        </div>
        <div class="meta-row">
          <div class="meta-label">Beste Sicht</div>
          <div class="meta-value" id="metaSeason">—</div>
        </div>
        <div class="meta-row">
          <div class="meta-label">Sichtbar von</div>
          <div class="meta-value" id="metaHemisphere">—</div>
        </div>
      </div>
      <button class="continue-btn" id="continueBtn">Weiter</button>
    </div>
  </div>

<script>
// === Alle 88 IAU-Sternbilder mit ausführlichen Daten ===

// hemisphere: nördliche/südliche/beide Hemisphären
// brightStar: hellster Stern + Helligkeit
// sky: [Rektaszension 0-24h, Deklination -90 bis 90]

  { id:"and", name:"Andromeda", latin:"Andromeda",

  { id:"aqr", name:"Wassermann", latin:"Aquarius",

    desc:"Der Altar, auf dem die Götter ihren Bund gegen die Titanen schworen, bevor sie in den Krieg zogen. Die Rauchwolken des Altars werden als die Milchstraße gedeutet. Liegt unterhalb des Skorpions und ist von Mitteleuropa aus nicht sichtbar.",

  { id:"ari", name:"Widder", latin:"Aries",
    desc:"Der goldene Widder, dessen Vlies Jason und die Argonauten suchten. Er rettete die Geschwister Phrixos und Helle vor dem Tod, indem er sie auf seinem Rücken über das Meer trug. Tierkreissternbild — die Sonne durchquert es im April und Mai.",

  { id:"boo", name:"Bärenhüter", latin:"Boötes",
    desc:"Der Hirte, der den Großen Bären über den Himmel treibt. Sein Hauptstern Arktur ist der hellste Stern der Nordhalbkugel und leuchtet in einem warmen Orange. Die Form erinnert an einen Drachen oder eine Eistüte.",

let currentIdx = 0;
let drawnLines = [];
let lastStarClicked = null;
let unlocked = new Set();
let view = "play";
let hintStarIdx = null;
let hintTimer = null;
let revealJustHappened = false;

try {
  const saved = localStorage.getItem("stellaria-unlocked");
  if (saved) unlocked = new Set(JSON.parse(saved));
} catch(e) {}

function saveProgress() {
  try { localStorage.setItem("stellaria-unlocked", JSON.stringify([...unlocked])); } catch(e) {}
}

function generateBgStars() {
  const svg = document.getElementById("bgStars");
  let html = "";
  for (let i = 0; i < 200; i++) {
    const x = Math.random() * 100;
    const y = Math.random() * 100;
    const size = Math.random() * 0.2 + 0.04;
    const dur = Math.random() * 4 + 2;
    const delay = Math.random() * 5;
    const op = Math.random() * 0.6 + 0.2;
    html += `<circle cx="${x}" cy="${y}" r="${size}" fill="white" opacity="${op}" style="animation: twinkle ${dur}s ease-in-out ${delay}s infinite"/>`;
  }
  svg.innerHTML = html;
}

function spawnShootingStar() {
  if (view !== "play" && view !== "gallery") return;
  const c = document.getElementById("shootingStars");
  const el = document.createElement("div");
  el.className = "shooting-star";
  el.style.left = (Math.random() * 60) + "%";
  el.style.top = (Math.random() * 40) + "%";
  el.style.transform = `rotate(${25 + Math.random() * 25}deg)`;
  c.appendChild(el);
  setTimeout(() => el.remove(), 1600);
}
setInterval(spawnShootingStar, 9000);
setTimeout(spawnShootingStar, 2000);

function showToast(msg) {
  document.querySelectorAll(".toast").forEach(t => t.remove());
  const t = document.createElement("div");
  t.className = "toast";
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 2000);
}

function renderConstellation() {
  const c = CONSTELLATIONS[currentIdx];
  const svg = document.getElementById("constellationSvg");
  const connectedStars = new Set();
  drawnLines.forEach(li => {
    connectedStars.add(c.lines[li][0]);
    connectedStars.add(c.lines[li][1]);
  });
  if (lastStarClicked !== null) connectedStars.add(lastStarClicked);

  let html = "";

  // Linien mit Glow
  drawnLines.forEach((li, idx) => {
    const line = c.lines[li];
    const a = c.stars[line[0]];
    const b = c.stars[line[1]];
    // Doppelte Linie für Glow-Effekt
    html += `<line x1="${a[0]}" y1="${a[1]}" x2="${b[0]}" y2="${b[1]}"
      stroke="rgba(255,220,150,0.25)" stroke-width="0.6" stroke-linecap="round"/>`;
    html += `<line x1="${a[0]}" y1="${a[1]}" x2="${b[0]}" y2="${b[1]}"
      stroke="rgba(255,235,180,0.85)" stroke-width="0.22" stroke-linecap="round"
      class="${idx === drawnLines.length - 1 ? 'line-drawn' : ''}"/>`;
  });

  // Sterne
  c.stars.forEach((s, i) => {
    const isUsed = connectedStars.has(i);
    const isLast = i === lastStarClicked;
    const isHint = i === hintStarIdx;
    const fill = isLast ? "#ffffff" : isUsed ? "#ffe4a8" : "rgba(255,255,255,0.95)";
    const r = isLast ? 1.5 : isUsed ? 1.2 : 0.9;
    const glow = isLast ? "drop-shadow(0 0 4px rgba(255,235,180,1))"
      : isUsed ? "drop-shadow(0 0 3px rgba(255,210,130,0.9))"
      : "drop-shadow(0 0 2px rgba(255,255,255,0.85))";

    if (isHint) {
      html += `<circle cx="${s[0]}" cy="${s[1]}" r="3.5" fill="rgba(150,200,255,0.4)" class="hint-glow"/>`;
    }
    // Soft halo for unused stars
    if (!isUsed && !isLast) {
      html += `<circle cx="${s[0]}" cy="${s[1]}" r="2" fill="rgba(255,255,255,0.08)"/>`;
    }
    html += `<circle cx="${s[0]}" cy="${s[1]}" r="${r}" fill="${fill}"
      style="filter: ${glow}; transition: all 0.3s ease; cursor: pointer;"
      class="${!isUsed && !isLast ? 'star-twinkle' : ''}"
      data-star="${i}"/>`;
    // großer Tap-Bereich
    html += `<circle cx="${s[0]}" cy="${s[1]}" r="5" fill="transparent"
      style="cursor: pointer;" data-star="${i}"/>`;
  });

  svg.innerHTML = html;
  svg.querySelectorAll("[data-star]").forEach(el => {
    el.addEventListener("click", (e) => {
      handleStarClick(parseInt(e.target.getAttribute("data-star")));
    });
  });

  document.getElementById("progressLabel").textContent =
    isComplete() ? "Vollendet" : `${drawnLines.length} / ${c.lines.length} Linien`;
  document.getElementById("constellationName").textContent = c.name;
  document.getElementById("constellationLatin").textContent = c.latin;
  document.getElementById("visibilityBadge").textContent = `${c.hemisphere} · ${c.season}`;
  document.getElementById("progressCount").textContent =
    `${unlocked.size} / ${CONSTELLATIONS.length} entdeckt`;
  document.getElementById("hintBtn").disabled = isComplete();
  document.getElementById("revealBtn").disabled = isComplete();
}

function getValidNextStars() {
  const c = CONSTELLATIONS[currentIdx];
  if (isComplete()) return [];
  const remaining = c.lines.map((l, i) => ({l, i})).filter(x => !drawnLines.includes(x.i));
  if (lastStarClicked === null) {
    const stars = new Set();
    remaining.forEach(({l}) => { stars.add(l[0]); stars.add(l[1]); });
    return [...stars];
  }
  const stars = new Set();
  remaining.forEach(({l}) => {
    if (l[0] === lastStarClicked) stars.add(l[1]);
    if (l[1] === lastStarClicked) stars.add(l[0]);
  });
  if (stars.size === 0) {
    remaining.forEach(({l}) => { stars.add(l[0]); stars.add(l[1]); });
  }
  return [...stars];
}

function handleStarClick(idx) {
  if (isComplete()) return;
  if (hintStarIdx !== null) {
    hintStarIdx = null;
    if (hintTimer) clearTimeout(hintTimer);
  }
  const c = CONSTELLATIONS[currentIdx];
  const valid = getValidNextStars();
  if (!valid.includes(idx)) {
    triggerShake();
    return;
  }
  if (lastStarClicked === null) {
    lastStarClicked = idx;
    renderConstellation();
    return;
  }
  const lineIdx = c.lines.findIndex((line, li) =>
    !drawnLines.includes(li) &&
    ((line[0] === lastStarClicked && line[1] === idx) ||
     (line[1] === lastStarClicked && line[0] === idx))
  );
  if (lineIdx === -1) {
    lastStarClicked = idx;
    renderConstellation();
    return;
  }
  drawnLines.push(lineIdx);
  lastStarClicked = idx;
  renderConstellation();
  if (isComplete()) {
    setTimeout(() => {
      const wasNew = !unlocked.has(c.id);
      unlocked.add(c.id);
      saveProgress();
      showComplete(wasNew, false);
    }, 700);
  }
}

function showHint() {
  if (isComplete()) return;
  const valid = getValidNextStars();
  if (valid.length === 0) return;
  let candidates = valid.filter(v => v !== hintStarIdx);
  if (candidates.length === 0) candidates = valid;
  hintStarIdx = candidates[Math.floor(Math.random() * candidates.length)];
  renderConstellation();
  showToast("Versuch diesen Stern");
  if (hintTimer) clearTimeout(hintTimer);
  hintTimer = setTimeout(() => {
    hintStarIdx = null;
    renderConstellation();
  }, 4000);
}

function revealConstellation() {
  if (isComplete()) return;
  lastStarClicked = null;
  hintStarIdx = null;
  if (hintTimer) clearTimeout(hintTimer);
  revealJustHappened = true;

  const c = CONSTELLATIONS[currentIdx];
  const remaining = c.lines.map((_, i) => i).filter(i => !drawnLines.includes(i));
  let i = 0;
  const drawNext = () => {
    if (i >= remaining.length) {
      setTimeout(() => showComplete(false, true), 600);
      return;
    }
    drawnLines.push(remaining[i]);
    renderConstellation();
    i++;
    setTimeout(drawNext, 280);
  };
  drawNext();
}

function isComplete() {
  return drawnLines.length === CONSTELLATIONS[currentIdx].lines.length;
}

function triggerShake() {
  const stage = document.getElementById("stage");
  stage.classList.add("shake");
  setTimeout(() => stage.classList.remove("shake"), 400);
}

function showComplete(wasNew, wasRevealed) {
  const c = CONSTELLATIONS[currentIdx];
  document.getElementById("completeLabel").textContent =
    wasRevealed ? "Aufgelöst" : (wasNew ? "Neu entdeckt" : "Sternbild vollendet");
  document.getElementById("completeName").textContent = c.name;
  document.getElementById("completeLatin").textContent = c.latin;
  document.getElementById("completeDesc").textContent = c.desc;
  document.getElementById("metaStar").textContent = c.brightStar;
  document.getElementById("metaSeason").textContent = c.season;
  document.getElementById("metaHemisphere").textContent = c.hemisphere;
  document.getElementById("completeOverlay").style.display = "flex";
}

function showInfo() {
  // Info-Panel zum aktuellen Sternbild zeigen (auch wenn nicht vollendet)
  const c = CONSTELLATIONS[currentIdx];
  document.getElementById("completeLabel").textContent = "Über dieses Sternbild";
  document.getElementById("completeName").textContent = c.name;
  document.getElementById("completeLatin").textContent = c.latin;
  document.getElementById("completeDesc").textContent = c.desc;
  document.getElementById("metaStar").textContent = c.brightStar;
  document.getElementById("metaSeason").textContent = c.season;
  document.getElementById("metaHemisphere").textContent = c.hemisphere;
  document.getElementById("continueBtn").textContent = "Schließen";
  document.getElementById("completeOverlay").style.display = "flex";
}

function nextConstellation() {
  document.getElementById("continueBtn").textContent = "Weiter";
  // Wenn Info-Panel war, einfach schließen
  if (document.getElementById("completeLabel").textContent === "Über dieses Sternbild") {
    document.getElementById("completeOverlay").style.display = "none";
    return;
  }
  currentIdx = (currentIdx + 1) % CONSTELLATIONS.length;
  drawnLines = [];
  lastStarClicked = null;
  hintStarIdx = null;
  document.getElementById("completeOverlay").style.display = "none";
  renderConstellation();
}

function renderGallery() {
  const grid = document.getElementById("galleryGrid");
  let html = "";
  CONSTELLATIONS.forEach((c, i) => {
    const isUnlocked = unlocked.has(c.id);
    let inner = "";
    if (isUnlocked) {
      c.lines.forEach(line => {
        const a = c.stars[line[0]];
        const b = c.stars[line[1]];
        inner += `<line x1="${a[0]}" y1="${a[1]}" x2="${b[0]}" y2="${b[1]}" stroke="rgba(255,220,150,0.55)" stroke-width="0.22"/>`;
      });
    }
    c.stars.forEach(s => {
      inner += `<circle cx="${s[0]}" cy="${s[1]}" r="${isUnlocked ? 0.9 : 0.5}" fill="${isUnlocked ? '#ffd97a' : 'rgba(255,255,255,0.3)'}"/>`;
    });
    html += `
      <div class="gallery-card ${isUnlocked ? '' : 'locked'}" data-idx="${i}" style="animation-delay: ${Math.min(i * 0.012, 0.5)}s">
        <svg viewBox="0 0 100 100">${inner}</svg>
        <div class="gallery-card-label">${isUnlocked ? c.name : "???"}</div>
      </div>`;
  });
  grid.innerHTML = html;
  document.getElementById("gallerySubtitle").textContent =
    `${unlocked.size} von ${CONSTELLATIONS.length} entdeckt`;
  grid.querySelectorAll(".gallery-card").forEach(el => {
    el.addEventListener("click", () => {
      currentIdx = parseInt(el.getAttribute("data-idx"));
      drawnLines = [];
      lastStarClicked = null;
      hintStarIdx = null;
      switchView("play");
    });
  });
}

// === 3D Himmelsansicht ===
let skyState = {
  rotY: 0, rotX: -0.2, velY: 0.003,
  isDragging: false, lastX: 0, lastY: 0, raf: null
};

function project3D(ra, dec, radius = 1) {
  const lon = (ra / 24) * Math.PI * 2;
  const lat = (dec / 90) * (Math.PI / 2);
  const x = radius * Math.cos(lat) * Math.cos(lon);
  const y = radius * Math.sin(lat);
  const z = radius * Math.cos(lat) * Math.sin(lon);
  return { x, y, z };
}

function rotatePoint(p, rotX, rotY) {
  let x = p.x * Math.cos(rotY) - p.z * Math.sin(rotY);
  let z = p.x * Math.sin(rotY) + p.z * Math.cos(rotY);
  let y = p.y;
  const y2 = y * Math.cos(rotX) - z * Math.sin(rotX);
  const z2 = y * Math.sin(rotX) + z * Math.cos(rotX);
  return { x, y: y2, z: z2 };
}

function renderSky() {
  const canvas = document.getElementById("skyCanvas");
  if (!canvas || canvas.style.display === "none") return;
  if (canvas.clientWidth === 0 || canvas.clientHeight === 0) return;

  const dpr = window.devicePixelRatio || 1;
  const targetW = canvas.clientWidth * dpr;
  const targetH = canvas.clientHeight * dpr;
  if (canvas.width !== targetW) canvas.width = targetW;
  if (canvas.height !== targetH) canvas.height = targetH;

  const W = canvas.width;
  const H = canvas.height;
  const ctx = canvas.getContext("2d");
  if (!ctx) return;

  const bgGrad = ctx.createRadialGradient(W/2, H/2, 0, W/2, H/2, Math.max(W,H)*0.7);
  bgGrad.addColorStop(0, "#1a1a3e");
  bgGrad.addColorStop(0.5, "#0a0a1f");
  bgGrad.addColorStop(1, "#050510");
  ctx.fillStyle = bgGrad;
  ctx.fillRect(0, 0, W, H);

  const cx = W / 2;
  const cy = H / 2;
  const radius = Math.min(W, H) * 0.42;

  if (!window._skyBgStars) {
    window._skyBgStars = [];
    for (let i = 0; i < 800; i++) {
      const ra = Math.random() * 24;
      const dec = (Math.random() * 180) - 90;
      const brightness = Math.random() * 0.7 + 0.3;
      const size = Math.random() * 1.5 + 0.3;
      window._skyBgStars.push({ ra, dec, brightness, size });
    }
  }

  window._skyBgStars.forEach(s => {
    const p = project3D(s.ra, s.dec);
    const r = rotatePoint(p, skyState.rotX, skyState.rotY);
    if (r.z > 0) {
      const px = cx + r.x * radius;
      const py = cy - r.y * radius;
      const depth = (r.z + 1) / 2;
      ctx.fillStyle = `rgba(255, 255, 255, ${s.brightness * depth * 0.7})`;
      ctx.beginPath();
      ctx.arc(px, py, s.size * dpr, 0, Math.PI * 2);
      ctx.fill();
    }
  });

  const labelsContainer = document.getElementById("skyLabels");
  labelsContainer.innerHTML = "";

  CONSTELLATIONS.forEach(c => {
    const isUnlocked = unlocked.has(c.id);
    if (!c.sky) return;
    const centerP = project3D(c.sky[0], c.sky[1]);
    const centerR = rotatePoint(centerP, skyState.rotX, skyState.rotY);
    if (centerR.z < 0) return;

    const localScale = 0.06;
    const localStars = c.stars.map(s => {
      const lx = (s[0] - 50) / 100 * localScale;
      const ly = (s[1] - 50) / 100 * localScale;
      const tx = { x: -Math.sin(c.sky[0]/24 * Math.PI*2), y: 0, z: Math.cos(c.sky[0]/24 * Math.PI*2) };
      const ty = { x: -Math.sin(c.sky[1]/90 * Math.PI/2) * Math.cos(c.sky[0]/24 * Math.PI*2),
                   y:  Math.cos(c.sky[1]/90 * Math.PI/2),
                   z: -Math.sin(c.sky[1]/90 * Math.PI/2) * Math.sin(c.sky[0]/24 * Math.PI*2) };
      const wx = centerP.x + tx.x * lx + ty.x * (-ly);
      const wy = centerP.y + tx.y * lx + ty.y * (-ly);
      const wz = centerP.z + tx.z * lx + ty.z * (-ly);
      const r = rotatePoint({x:wx,y:wy,z:wz}, skyState.rotX, skyState.rotY);
      return r;
    });

    if (isUnlocked) {
      ctx.strokeStyle = `rgba(255, 220, 150, ${0.5 + centerR.z * 0.3})`;
      ctx.lineWidth = 1.2 * dpr;
      ctx.shadowBlur = 4;
      ctx.shadowColor = "rgba(255,200,100,0.5)";
      c.lines.forEach(line => {
        const a = localStars[line[0]];
        const b = localStars[line[1]];
        if (a.z > 0 && b.z > 0) {
          ctx.beginPath();
          ctx.moveTo(cx + a.x * radius, cy - a.y * radius);
          ctx.lineTo(cx + b.x * radius, cy - b.y * radius);
          ctx.stroke();
        }
      });
      ctx.shadowBlur = 0;
    }

    localStars.forEach((s) => {
      if (s.z < 0) return;
      const px = cx + s.x * radius;
      const py = cy - s.y * radius;
      const depth = (s.z + 1) / 2;
      const isUsed = isUnlocked;
      const color = isUsed ? `rgba(255, 217, 122, ${0.8 + depth * 0.2})`
                           : `rgba(255, 255, 255, ${0.5 + depth * 0.4})`;
      const size = (isUsed ? 2.0 : 1.4) * dpr * (0.7 + depth * 0.3);
      ctx.fillStyle = color;
      ctx.shadowBlur = isUsed ? 8 : 4;
      ctx.shadowColor = isUsed ? "rgba(255,200,100,0.7)" : "rgba(255,255,255,0.5)";
      ctx.beginPath();
      ctx.arc(px, py, size, 0, Math.PI * 2);
      ctx.fill();
      ctx.shadowBlur = 0;
    });

    if (isUnlocked && centerR.z > 0.3) {
      const px = cx + centerR.x * radius;
      const py = cy - centerR.y * radius;
      const lab = document.createElement("div");
      lab.className = "sky-label";
      lab.textContent = c.name;
      lab.style.left = (px / dpr) + "px";
      lab.style.top = (py / dpr + 30) + "px";
      lab.style.opacity = Math.min(1, (centerR.z - 0.3) * 2);
      labelsContainer.appendChild(lab);
    }
  });
}

function animateSky() {
  if (view !== "sky") {
    if (skyState.raf) cancelAnimationFrame(skyState.raf);
    return;
  }
  if (!skyState.isDragging) {
    skyState.rotY += skyState.velY;
  }
  renderSky();
  skyState.raf = requestAnimationFrame(animateSky);
}

function setupSkyInteraction() {
  const canvas = document.getElementById("skyCanvas");
  const onStart = (x, y) => { skyState.isDragging = true; skyState.lastX = x; skyState.lastY = y; };
  const onMove = (x, y) => {
    if (!skyState.isDragging) return;
    const dx = x - skyState.lastX;
    const dy = y - skyState.lastY;
    skyState.rotY += dx * 0.005;
    skyState.rotX = Math.max(-Math.PI/2, Math.min(Math.PI/2, skyState.rotX + dy * 0.005));
    skyState.lastX = x;
    skyState.lastY = y;
  };
  const onEnd = () => { skyState.isDragging = false; };

  canvas.addEventListener("mousedown", e => onStart(e.clientX, e.clientY));
  canvas.addEventListener("mousemove", e => onMove(e.clientX, e.clientY));
  canvas.addEventListener("mouseup", onEnd);
  canvas.addEventListener("mouseleave", onEnd);
  canvas.addEventListener("touchstart", e => {
    if (e.touches.length === 1) onStart(e.touches[0].clientX, e.touches[0].clientY);
  }, { passive: true });
  canvas.addEventListener("touchmove", e => {
    if (e.touches.length === 1) {
      onMove(e.touches[0].clientX, e.touches[0].clientY);
      e.preventDefault();
    }
  }, { passive: false });
  canvas.addEventListener("touchend", onEnd);
}

function switchView(target) {
  view = target;
  document.getElementById("gallery").style.display = "none";
  document.getElementById("stage").style.display = "none";
  document.getElementById("footer").style.display = "none";
  document.getElementById("skyCanvas").style.display = "none";
  document.getElementById("skyLabels").style.display = "none";
  document.getElementById("skyInfo").style.display = "none";
  document.getElementById("infoBtn").style.display = "none";

  document.getElementById("galleryBtn").classList.remove("active");
  document.getElementById("skyBtn").classList.remove("active");

  if (target === "gallery") {
    document.getElementById("gallery").style.display = "block";
    document.getElementById("galleryBtn").textContent = "Zurück";
    document.getElementById("galleryBtn").classList.add("active");
    renderGallery();
  } else if (target === "sky") {
    const canvas = document.getElementById("skyCanvas");
    canvas.style.display = "block";
    document.getElementById("skyLabels").style.display = "block";
    document.getElementById("skyInfo").style.display = "block";
    document.getElementById("skyBtn").textContent = "Zurück";
    document.getElementById("skyBtn").classList.add("active");
    setTimeout(() => {
      canvas.width = canvas.clientWidth * window.devicePixelRatio;
      canvas.height = canvas.clientHeight * window.devicePixelRatio;
      animateSky();
    }, 50);
  } else {
    document.getElementById("stage").style.display = "flex";
    document.getElementById("footer").style.display = "block";
    document.getElementById("infoBtn").style.display = "block";
    document.getElementById("galleryBtn").textContent = "Sammlung";
    document.getElementById("skyBtn").textContent = "Himmel";
    renderConstellation();
  }
}

document.getElementById("galleryBtn").addEventListener("click", () => {
  switchView(view === "gallery" ? "play" : "gallery");
});
document.getElementById("skyBtn").addEventListener("click", () => {
  switchView(view === "sky" ? "play" : "sky");
});
document.getElementById("continueBtn").addEventListener("click", nextConstellation);
document.getElementById("closeCompleteBtn").addEventListener("click", () => {
  document.getElementById("completeOverlay").style.display = "none";
  document.getElementById("continueBtn").textContent = "Weiter";
});
document.getElementById("hintBtn").addEventListener("click", showHint);
document.getElementById("revealBtn").addEventListener("click", () => {
  if (confirm("Das Sternbild komplett auflösen?")) revealConstellation();
});
document.getElementById("infoBtn").addEventListener("click", showInfo);
document.getElementById("resetBtn").addEventListener("click", () => {
  if (confirm("Allen Fortschritt wirklich zurücksetzen?")) {
    unlocked = new Set();
    saveProgress();
    renderGallery();
    document.getElementById("progressCount").textContent =
      `0 / ${CONSTELLATIONS.length} entdeckt`;
  }
});

window.addEventListener("resize", () => {
  if (view === "sky") renderSky();
});

generateBgStars();
setupSkyInteraction();
renderConstellation();
</script>
